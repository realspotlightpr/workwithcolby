<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Work with Colby — Something Big Is Coming</title>
  <meta name="description" content="A new way to work with Colby is coming soon. Watch the preview and get notified when we launch.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#071722;--cream:#fffaf2;--teal:#18d7d3;--blue:#357dff;--violet:#8a5cff;--coral:#ff6375;--mango:#ffb12b}
    *{box-sizing:border-box}
    html,body{width:100%;height:100%;margin:0;overflow:hidden}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--ink);color:#fff}
    .stage{position:relative;width:100%;height:100dvh;min-height:560px;isolation:isolate;overflow:hidden}
    .motion{position:absolute;inset:-3%;width:106%;height:106%;object-fit:cover;z-index:-5;filter:saturate(1.25) contrast(1.05);animation:drift 18s ease-in-out infinite alternate}
    .veil{position:absolute;inset:0;z-index:-4;background:linear-gradient(90deg,rgba(3,17,29,.94) 0%,rgba(5,21,35,.82) 44%,rgba(5,18,34,.58) 100%)}
    .aurora{position:absolute;inset:0;z-index:-3;overflow:hidden}
    .orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.46;mix-blend-mode:screen;animation:float 10s ease-in-out infinite alternate}
    .orb.one{width:40vw;height:40vw;background:var(--teal);left:-14vw;top:-20vw}
    .orb.two{width:42vw;height:42vw;background:var(--violet);right:-15vw;top:-12vw;animation-delay:-4s}
    .orb.three{width:32vw;height:32vw;background:var(--coral);right:20vw;bottom:-24vw;animation-delay:-7s}
    .grain{position:absolute;inset:0;z-index:-2;opacity:.09;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.8'/%3E%3C/svg%3E")}
    .shell{width:min(1380px,calc(100% - 64px));height:100%;margin:auto;display:grid;grid-template-rows:auto 1fr;position:relative;z-index:2}
    header{display:flex;align-items:center;padding:28px 0 12px}
    .brand{display:flex;align-items:center;gap:12px;font-family:'Fraunces',serif;font-weight:900;font-size:1.2rem;letter-spacing:-.02em}
    .face{width:38px;height:38px;border-radius:50%;background:url('assets/colby-profile.png') center 22%/cover;border:2px solid rgba(255,255,255,.82);box-shadow:0 0 0 5px rgba(24,215,211,.16)}
    .content{display:grid;grid-template-columns:minmax(0,.88fr) minmax(480px,1.12fr);gap:clamp(38px,6vw,96px);align-items:center;padding:10px 0 38px}
    .copy{max-width:650px}
    .kicker{display:inline-flex;align-items:center;gap:10px;padding:9px 14px;border:1px solid rgba(255,255,255,.24);border-radius:999px;background:rgba(255,255,255,.08);backdrop-filter:blur(14px);text-transform:uppercase;letter-spacing:.18em;font-size:.72rem;font-weight:800}
    .pulse{width:8px;height:8px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 0 rgba(24,215,211,.75);animation:pulse 1.8s infinite}
    h1{font-family:'Fraunces',serif;font-size:clamp(3.25rem,6.2vw,6.7rem);line-height:.91;letter-spacing:-.055em;margin:24px 0 22px;max-width:820px}
    .gradient{background:linear-gradient(100deg,var(--teal),#55a3ff 42%,#ab75ff 72%,#ff8190);-webkit-background-clip:text;background-clip:text;color:transparent}
    .lead{max-width:590px;margin:0 0 28px;color:rgba(255,255,255,.76);font-size:clamp(1rem,1.5vw,1.2rem);line-height:1.65}
    .cta{display:inline-flex;align-items:center;justify-content:center;gap:10px;min-height:56px;padding:0 25px;border-radius:999px;text-decoration:none;color:#071722;background:linear-gradient(105deg,var(--mango),#ff8068 55%,var(--coral));font-weight:800;box-shadow:0 15px 45px rgba(255,99,117,.3);transition:transform .2s,box-shadow .2s}
    .cta:hover{transform:translateY(-3px);box-shadow:0 20px 55px rgba(255,99,117,.4)}
    .cta:focus-visible{outline:3px solid #fff;outline-offset:4px}
    .video-wrap{position:relative;width:100%;max-width:780px;justify-self:end;padding:1px;border-radius:28px;background:linear-gradient(135deg,var(--teal),var(--blue),var(--violet),var(--coral));box-shadow:0 28px 90px rgba(0,0,0,.5)}
    .video-wrap:before{content:"";position:absolute;inset:-16px;border-radius:38px;border:1px solid rgba(255,255,255,.13);pointer-events:none}
    .video-top{position:absolute;z-index:2;left:18px;top:17px;display:flex;gap:6px}
    .video-top i{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.75)}
    .intro{width:100%;aspect-ratio:16/9;display:block;object-fit:cover;border-radius:27px;background:#06192b}
    .caption{position:absolute;right:18px;bottom:17px;z-index:2;padding:8px 11px;border-radius:999px;background:rgba(4,17,30,.7);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(10px);font-size:.7rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase}
    @keyframes float{to{transform:translate3d(6vw,4vh,0) scale(1.12)}}
    @keyframes drift{to{transform:scale(1.04) translate3d(-1%,1%,0)}}
    @keyframes pulse{70%{box-shadow:0 0 0 10px rgba(24,215,211,0)}100%{box-shadow:0 0 0 0 rgba(24,215,211,0)}}
    @media(max-width:900px){.shell{width:min(100% - 34px,720px)}header{padding-top:18px}.content{grid-template-columns:1fr;gap:20px;align-content:center;text-align:center;padding:0 0 18px}.copy{margin:auto}.kicker{font-size:.62rem}h1{font-size:clamp(2.55rem,11vw,4.5rem);margin:15px 0 12px}.lead{font-size:.94rem;line-height:1.5;margin:0 auto 16px}.cta{min-height:48px;padding:0 20px}.video-wrap{justify-self:center;max-width:min(100%,620px)}.video-wrap:before{inset:-7px;border-radius:32px}}
    @media(max-width:520px){.stage{min-height:500px}.brand{font-size:1rem}.face{width:32px;height:32px}.content{align-content:start;padding-top:4vh}.kicker{padding:7px 10px}h1{font-size:clamp(2.45rem,12.6vw,3.6rem)}.lead{display:none}.video-wrap{margin-top:5px}.caption{font-size:.55rem}.video-top{top:12px;left:13px}}
    @media(max-height:700px) and (min-width:901px){header{padding-top:16px}.content{padding-bottom:18px}h1{font-size:clamp(3.1rem,5.5vw,5.3rem);margin:17px 0}.lead{margin-bottom:18px}}
    @media(prefers-reduced-motion:reduce){.motion,.orb,.pulse{animation:none}}
  </style>
</head>
<body>
  <main class="stage">
    <video class="motion" autoplay muted loop playsinline preload="auto" poster="assets/hero-poster.jpg" aria-hidden="true"><source src="assets/hero-bg.mp4" type="video/mp4"></video>
    <div class="veil"></div><div class="aurora"><span class="orb one"></span><span class="orb two"></span><span class="orb three"></span></div><div class="grain"></div>
    <div class="shell">
      <header><div class="brand"><span class="face" aria-hidden="true"></span>Work with Colby</div></header>
      <section class="content" aria-labelledby="launch-title">
        <div class="copy">
          <span class="kicker"><span class="pulse"></span>Something new is loading</span>
          <h1 id="launch-title">The future of getting things <span class="gradient">done</span> is almost here.</h1>
          <p class="lead">A sharper, faster way to work with Colby is on the way. Watch the preview, then get on the launch list.</p>
          <a class="cta" href="sms:+17875493076?body=Notify%20me%20when%20the%20new%20Work%20with%20Colby%20site%20launches.">Notify me when we launch <span aria-hidden="true">→</span></a>
        </div>
        <div class="video-wrap">
          <div class="video-top" aria-hidden="true"><i></i><i></i><i></i></div>
          <video class="intro" controls playsinline preload="metadata" aria-label="Meet Colby's AI twin"><source src="assets/intro-video.mp4" type="video/mp4">Your browser does not support video playback.</video>
          <span class="caption">Meet Colby's AI twin</span>
        </div>
      </section>
    </div>
  </main>
  <script>
    var backgroundVideo=document.querySelector('.motion');
    if(backgroundVideo){backgroundVideo.muted=true;backgroundVideo.defaultMuted=true;var attempt=backgroundVideo.play();if(attempt&&attempt.catch)attempt.catch(function(){});}
  </script>
</body>
</html>
